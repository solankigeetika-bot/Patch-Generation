name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python syntax
        run: |
          python3 -m py_compile backend/main.py
          python3 -m py_compile backend/verify_ls.py
          python3 -m py_compile backend/corrections_store.py
          echo "All Python files compile OK."

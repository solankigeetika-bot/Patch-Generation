async function stitchAll(){
  const accepted=remarks.filter(r=>r.needsPatch&&RS[r.idx].acceptedTake>=0);
  if(!accepted.length){toast('Accept at least one take first','warn');return;}
  // Get signed audio URL from CMS API
  let epAudioUrl = null;
  try{
    const showId = activeEp._bookId || activeEp.book_id || activeShowId || '';
    const chapId = activeEp.chapter_id;
    const muResp = await fetch(`${CMS_BASE}/get_media_url?type=episode&media_type=audio&event=play&chapter_id=${chapId}&show_id=${showId}`, {headers: hdrs()});
    if(muResp.ok){
      const muData = await muResp.json();
      epAudioUrl = muData.result?.media_url || muData.result?.url || muData.media_url || muData.url || null;
    }
  }catch(e){ console.error('get_media_url failed:', e); }
  if(!epAudioUrl){ toast('Could not get audio URL from CMS','warn'); return; }

  showOv('🔊','Fetching Episode Audio','Downloading from CMS...',10);
  try{
    const epResp=await fetch(epAudioUrl);
    if(!epResp.ok) throw new Error('Cannot fetch episode audio: '+epResp.status);
    const epBlob=await epResp.blob();
    showOv('🎛','Decoding Audio','Preparing buffers...',25);
    const epBuf=await blobToAudioBuf(epBlob);

    // Sort patches by start time, parse time ranges
    const sorted=[...accepted].sort((a,b)=>parseTime(a.time)-parseTime(b.time));
    showOv('🎙','Loading Patches','Decoding accepted takes...',40);
    const patches=[];
    for(const r of sorted){
      const pBlob=await fetch(RS[r.idx].takes[RS[r.idx].acceptedTake]).then(x=>x.blob());
      const pBuf=await blobToAudioBuf(pBlob);
      const range=parseTimeRange(r.time);
      patches.push({startSec:range.startSec, endSec:range.endSec, buf:pBuf});
    }

    showOv('✂️','Detecting line boundaries...','Using silence detection for precise cuts',55);

    // Detect exact line boundaries using silence gaps in the original audio
    for(const p of patches){
      // Find silence gap just before the QC timestamp = line start
      p.lineStart = findSilenceBefore(epBuf, p.startSec, {searchSec:2, threshold:0.012});
      // Find silence gap after the line = line end
      // If QC has end time, search near it; otherwise search after start
      const searchAfter = p.endSec || (p.startSec + p.buf.duration);
      p.lineEnd = findSilenceAfter(epBuf, searchAfter, {searchSec:5, threshold:0.012});
      // Fallback: if no silence found after, use start + patch duration + small margin
      if(p.lineEnd == null) p.lineEnd = p.startSec + p.buf.duration + 0.2;
      console.log(`Patch at ${p.startSec}s → detected line: ${p.lineStart.toFixed(2)}s – ${p.lineEnd.toFixed(2)}s (${(p.lineEnd-p.lineStart).toFixed(2)}s original, ${p.buf.duration.toFixed(2)}s patch)`);
    }

    showOv('✂️','Stitching','Building synced output...',65);

    // Build segments: keep good parts, replace bad parts with patches
    // Pad or trim to maintain total duration sync
    const sr=epBuf.sampleRate, ch=epBuf.numberOfChannels;
    const segments=[];
    let prevEnd=0;
    for(const p of patches){
      // Keep good audio before this line
      if(p.lineStart>prevEnd) segments.push({type:'ep',start:prevEnd,end:p.lineStart});
      // Insert the patch
      segments.push({type:'patch',buf:p.buf});
      // Calculate duration difference and pad with silence to maintain sync
      const origLineDur = p.lineEnd - p.lineStart;
      const patchDur = p.buf.duration;
      if(patchDur < origLineDur){
        // Patch is shorter — add silence padding to keep everything aligned
        const padSec = origLineDur - patchDur;
        segments.push({type:'silence', duration:padSec});
        console.log(`  → padding ${padSec.toFixed(2)}s silence to maintain sync`);
      } else if(patchDur > origLineDur + 0.5){
        // Patch is significantly longer — warn but accept the shift
        console.warn(`  → patch is ${(patchDur-origLineDur).toFixed(2)}s longer than original, slight timing shift`);
      }
      prevEnd = p.lineEnd;
    }
    if(prevEnd<epBuf.duration) segments.push({type:'ep',start:prevEnd,end:epBuf.duration});

    const totalLen=segments.reduce((s,seg)=>{
      if(seg.type==='ep') return s+(seg.end-seg.start)*sr;
      if(seg.type==='silence') return s+Math.floor(seg.duration*sr);
      return s+seg.buf.length;
    },0);
    const outCtx=new OfflineAudioContext(ch,Math.ceil(totalLen),sr);
    let cursor=0;
    for(const seg of segments){
      let buf;
      if(seg.type==='ep') buf=cropBuf(epBuf,seg.start,seg.end);
      else if(seg.type==='silence') buf=silenceBuf(seg.duration,sr,ch);
      else buf=matchBuf(seg.buf,sr,ch);
      const src=outCtx.createBufferSource(); src.buffer=buf; src.connect(outCtx.destination); src.start(cursor);
      cursor+=buf.duration;
    }
    showOv('💾','Encoding','Converting to WAV...',80);
    const rendered=await outCtx.startRendering();
    finalAudioBlob=bufToWav(rendered);
    finalAudioUrl=URL.createObjectURL(finalAudioBlob);
    // Update SE data with stitched URL
    if(activeEp){
      updateSEDataForCurrentEp();
      saveSEData(activeEp.chapter_id, activeEp.chapter_title||'Episode', JSON.parse(localStorage.getItem('ps_se_data')||'{}')[activeEp.chapter_id]?.patches||[], finalAudioUrl);
    }
    showOv('✅','Done!','',100);
    await sleep(500); hideOv();
    renderContent();
    document.getElementById('mainContent').scrollTop=0;
    toast(`Stitched ${patches.length} patches ✓`,'ok');
  }catch(e){
    hideOv(); toast('Stitch failed: '+e.message,'err'); console.error(e);
  }
}

// ── CMS Upload ───────────────────────────────────────────────
async function uploadToCMS(){
  if(!finalAudioBlob){toast('No stitched audio','warn');return;}
  const statusEl=document.getElementById('uploadStatus');
  statusEl.innerHTML='<div class="upload-status us-load">⏳ Getting S3 upload URL from CMS...</div>';
  try{
    // Step 1: Get presigned S3 URL
    // CMS uses AudioStack internally — we upload the stitched WAV to replace media_url
    const bookId = activeEp.book_id || activeEp._bookId || '';
    const chapId = activeEp.chapter_id;

    // Try the presigned URL endpoint (update once confirmed from network tab)
    const presignResp = await fetch(
      `${CMS_BASE}/book.get_upload_url?chapter_id=${chapId}&book_id=${bookId}&is_novel=0&file_type=audio`,
      { headers: hdrs() }
    );

    if(!presignResp.ok){
      // Fallback: show manual download + instructions
      statusEl.innerHTML=`<div class="upload-status us-err" style="line-height:1.7">
        ⚠ CMS upload endpoint not yet confirmed.<br>
        Share the network tab "Generate Audio" request URL to complete auto-upload.<br>
        <a href="${finalAudioUrl}" download="stitched_${chapId}.wav" style="color:var(--accent);font-weight:700">⬇ Download WAV to upload manually</a>
      </div>`;
      toast('Share the Generate Audio network request to enable auto-upload','warn');
      return;
    }

    const presignData = await presignResp.json();
    const s3Url  = presignData.upload_url || presignData.presigned_url || presignData.url || presignData.s3_url;
    const fileKey = presignData.file_key || presignData.key || presignData.s3_key;
    if(!s3Url) throw new Error('No S3 URL in CMS response: ' + JSON.stringify(presignData));

    // Step 2: Upload WAV to S3
    statusEl.innerHTML='<div class="upload-status us-load">⬆ Uploading stitched audio to S3...</div>';
    const s3Resp = await fetch(s3Url, {
      method: 'PUT',
      body: finalAudioBlob,
      headers: { 'Content-Type': 'audio/wav' }
    });
    if(!s3Resp.ok) throw new Error('S3 upload failed: HTTP ' + s3Resp.status);

    // Step 3: Notify CMS — update media_url for this chapter
    statusEl.innerHTML='<div class="upload-status us-load">📡 Updating CMS media_url...</div>';
    const notifyResp = await fetch(`${CMS_BASE}/book.update_chapter_media`, {
      method: 'POST',
      headers: hdrs(),
      body: JSON.stringify({
        chapter_id: chapId,
        book_id: bookId,
        file_key: fileKey,
        is_novel: 0,
        media_type: 'final_audio'
      })
    });
    if(!notifyResp.ok) throw new Error('CMS update failed: HTTP ' + notifyResp.status);

    statusEl.innerHTML='<div class="upload-status us-ok">✓ Stitched audio uploaded to CMS media_url!</div>';
    toast('Approved and uploaded to CMS ✓','ok');
  }catch(e){
    statusEl.innerHTML=`<div class="upload-status us-err">
      ✗ ${esc(e.message)}<br>
      <a href="${finalAudioUrl}" download="stitched_${activeEp?.chapter_id||'ep'}.wav" style="color:var(--accent)">⬇ Download WAV instead</a>
    </div>`;
    toast('Upload error: '+e.message,'err');
  }
}

// ── Audio Utilities ──────────────────────────────────────────
async function blobToAudioBuf(blob){
  const ab=await blob.arrayBuffer(), ctx=new AudioContext();
  try{ return await ctx.decodeAudioData(ab); } finally{ ctx.close(); }
}
function cropBuf(buf,s,e){
  const sr=buf.sampleRate,ch=buf.numberOfChannels;
  const si=Math.floor(s*sr),ei=Math.min(Math.floor(e*sr),buf.length),len=Math.max(1,ei-si);
  const out=new AudioBuffer({length:len,numberOfChannels:ch,sampleRate:sr});
  for(let c=0;c<ch;c++) out.copyToChannel(buf.getChannelData(c).slice(si,ei),c);
  return out;
}
function matchBuf(buf,targetSr,targetCh){
  if(buf.sampleRate===targetSr&&buf.numberOfChannels===targetCh) return buf;
  const len=Math.floor(buf.duration*targetSr);
  const out=new AudioBuffer({length:len,numberOfChannels:targetCh,sampleRate:targetSr});
  for(let c=0;c<targetCh;c++){
    const sc=c<buf.numberOfChannels?c:buf.numberOfChannels-1;
    const sd=buf.getChannelData(sc),od=out.getChannelData(c);
    const ratio=sd.length/len;
    for(let i=0;i<len;i++) od[i]=sd[Math.floor(i*ratio)]||0;
  }
  return out;
}
// ── Silence Detection ────────────────────────────────────────
// Compute RMS energy in a short window
function rms(channelData, start, len){
  let sum=0;
  const end=Math.min(start+len, channelData.length);
  for(let i=start;i<end;i++) sum+=channelData[i]*channelData[i];
  return Math.sqrt(sum/(end-start));
}

// Find the nearest silence gap BEFORE a given time (seconds)
// Scans backwards from the timestamp looking for a low-energy region
function findSilenceBefore(buf, timeSec, opts={}){
  const sr=buf.sampleRate;
  const winSize=Math.floor((opts.winMs||30)*sr/1000); // 30ms window
  const threshold=opts.threshold||0.01; // RMS threshold for "silence"
  const minGapSamples=Math.floor((opts.minGapMs||50)*sr/1000); // min 50ms gap
  const searchRange=Math.floor((opts.searchSec||3)*sr); // search up to 3s before
  const data=buf.getChannelData(0);
  const centerSample=Math.floor(timeSec*sr);
  const searchStart=Math.max(0, centerSample-searchRange);

  // Scan backwards from the timestamp
  let silenceEnd=-1, silenceStart=-1;
  for(let i=centerSample; i>=searchStart; i-=winSize){
    const e=rms(data, i, winSize);
    if(e<threshold){
      if(silenceEnd<0) silenceEnd=i+winSize;
      silenceStart=i;
    } else if(silenceEnd>0){
      // Found end of silence gap (going backwards)
      if(silenceEnd-silenceStart>=minGapSamples){
        // Good silence gap found — return the midpoint
        return (silenceStart+Math.floor((silenceEnd-silenceStart)/2))/sr;
      }
      silenceEnd=-1; silenceStart=-1;
    }
  }
  // If we found a gap at the very start of search
  if(silenceEnd>0 && silenceEnd-silenceStart>=minGapSamples){
    return (silenceStart+Math.floor((silenceEnd-silenceStart)/2))/sr;
  }
  // No silence found — fall back to the original timestamp
  return timeSec;
}

// Find the nearest silence gap AFTER a given time
function findSilenceAfter(buf, timeSec, opts={}){
  const sr=buf.sampleRate;
  const winSize=Math.floor((opts.winMs||30)*sr/1000);
  const threshold=opts.threshold||0.01;
  const minGapSamples=Math.floor((opts.minGapMs||50)*sr/1000);
  const searchRange=Math.floor((opts.searchSec||8)*sr); // search up to 8s after (lines can be long)
  const data=buf.getChannelData(0);
  const centerSample=Math.floor(timeSec*sr);
  const searchEnd=Math.min(data.length, centerSample+searchRange);

  let silenceStart=-1, silenceEnd=-1;
  for(let i=centerSample; i<searchEnd; i+=winSize){
    const e=rms(data, i, winSize);
    if(e<threshold){
      if(silenceStart<0) silenceStart=i;
      silenceEnd=i+winSize;
    } else if(silenceStart>0){
      if(silenceEnd-silenceStart>=minGapSamples){
        return (silenceStart+Math.floor((silenceEnd-silenceStart)/2))/sr;
      }
      silenceStart=-1; silenceEnd=-1;
    }
  }
  if(silenceStart>0 && silenceEnd-silenceStart>=minGapSamples){
    return (silenceStart+Math.floor((silenceEnd-silenceStart)/2))/sr;
  }
  // No silence found — estimate end as start + patch duration (caller provides)
  return null;
}

// Create a silent AudioBuffer of given duration
function silenceBuf(durationSec, sampleRate, channels){
  const len=Math.max(1, Math.floor(durationSec*sampleRate));
  return new AudioBuffer({length:len, numberOfChannels:channels, sampleRate:sampleRate});
}

// ── Tone Matching Helpers ────────────────────────────────────
function estimateSpeed(audioBuf, timeSec){
  if(!audioBuf) return 1.0;
  const data=audioBuf.getChannelData(0), sr=audioBuf.sampleRate;
  const start=Math.max(0, Math.floor((timeSec-2.5)*sr));
  const end=Math.min(data.length, Math.floor((timeSec+2.5)*sr));
  if(end<=start) return 1.0;
  // Count zero crossings as proxy for speech rate
  let crossings=0;
  for(let i=start+1;i<end;i++) if((data[i]>=0)!==(data[i-1]>=0)) crossings++;
  const duration=(end-start)/sr;
  const rate=crossings/duration;
  // Average speech ~100-120 crossings/sec. Map to speed param.
  const speed=Math.round(Math.max(0.7, Math.min(1.5, rate/110))*100)/100;
  console.log(`Speed analysis at ${timeSec}s: ${crossings} crossings, rate=${rate.toFixed(1)}/s → speed=${speed}`);
  return speed;
}

function normalizeVolume(patchBuf, originalBuf, timeSec){
  if(!originalBuf||!patchBuf) return patchBuf;
  const sr=originalBuf.sampleRate;
  const origStart=Math.max(0,Math.floor((timeSec-1.5)*sr));
  const origRMS=rms(originalBuf.getChannelData(0), origStart, sr*3);
  const patchRMS=rms(patchBuf.getChannelData(0), 0, patchBuf.length);
  if(patchRMS===0||origRMS===0) return patchBuf;
  const gain=origRMS/patchRMS;
  // Clamp gain to avoid extreme amplification
  const clampedGain=Math.max(0.3, Math.min(3.0, gain));
  console.log(`Volume: original RMS=${origRMS.toFixed(4)}, patch RMS=${patchRMS.toFixed(4)}, gain=${clampedGain.toFixed(2)}`);
  for(let c=0;c<patchBuf.numberOfChannels;c++){
    const d=patchBuf.getChannelData(c);
    for(let i=0;i<d.length;i++) d[i]*=clampedGain;
  }
  return patchBuf;
}

function getScriptContext(scriptLine, linesBefore=1, linesAfter=1){
  if(!episodeScript.length||!scriptLine) return scriptLine;
  // Find the best matching line in the full script
  const targetLower=scriptLine.toLowerCase().substring(0,40);
  let bestIdx=-1, bestScore=0;
  for(let i=0;i<episodeScript.length;i++){
    const lineLower=episodeScript[i].toLowerCase();
    if(lineLower.includes(targetLower)){ bestIdx=i; bestScore=100; break; }
    // Partial match: count common words
    const targetWords=targetLower.split(/\s+/);
    const matches=targetWords.filter(w=>w.length>3&&lineLower.includes(w)).length;
    if(matches>bestScore){ bestScore=matches; bestIdx=i; }
  }
  if(bestIdx<0||bestScore<2) return scriptLine;
  // Extract surrounding lines as context
  const before=episodeScript.slice(Math.max(0,bestIdx-linesBefore),bestIdx);
  const after=episodeScript.slice(bestIdx+1,bestIdx+1+linesAfter);
  const context=[...before, scriptLine, ...after].join('\n');
  console.log(`Script context: found at line ${bestIdx}, using ${before.length} before + ${after.length} after`);
  return context;
}

// Convert AudioBuffer back to Blob (for storing volume-normalized audio)
function audioBufToBlob(buf){
  const wav=bufToWav(buf);
  return wav;
}

function parseTime(t){
  const s=t.split('-')[0].trim().split(':').map(Number);
  return (s[0]||0)*60+(s[1]||0);
}
function parseTimeRange(t){
  const parts=t.split('-').map(p=>p.trim());
  const start=parts[0].split(':').map(Number);
  const startSec=(start[0]||0)*60+(start[1]||0);
  let endSec=null;
  if(parts[1]){
    const end=parts[1].split(':').map(Number);
    endSec=(end[0]||0)*60+(end[1]||0);
  }
  return {startSec, endSec};
}
function bufToWav(buf){
  const ch=buf.numberOfChannels,sr=buf.sampleRate,len=buf.length,bps=2;
  const ds=len*ch*bps,ab=new ArrayBuffer(44+ds),v=new DataView(ab);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i));};
  ws(0,'RIFF');v.setUint32(4,36+ds,true);ws(8,'WAVE');ws(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,ch,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*ch*bps,true);v.setUint16(32,ch*bps,true);
  v.setUint16(34,16,true);ws(36,'data');v.setUint32(40,ds,true);
  let o=44;
  for(let i=0;i<len;i++) for(let c=0;c<ch;c++){
    const s=Math.max(-1,Math.min(1,buf.getChannelData(c)[i]));
    v.setInt16(o,s<0?s*0x8000:s*0x7FFF,true);o+=2;
  }
  return new Blob([ab],{type:'audio/wav'});
}

// ── UI ───────────────────────────────────────────────────────
function refreshCard(ri){
  const el=document.getElementById(`rc-${ri}`); if(el) el.outerHTML=mkCard(remarks[ri]);
  const op=document.querySelector('.op-bar');
  if(op){
    const accepted=remarks.filter(r=>r.needsPatch&&RS[r.idx].acceptedTake>=0);
    const needed=remarks.filter(r=>r.needsPatch);
    op.querySelector('.op-lbl').innerHTML=`Accepted: <strong style="color:var(--green)">${accepted.length}</strong> / ${needed.length} patches`;
    op.querySelector('.op-count').textContent=accepted.length===needed.length&&needed.length>0?'✓ All accepted — stitch ready!':accepted.length>0?`${needed.length-accepted.length} remaining`:'Generate and accept patches';
  }
}
function setStatus(s,t){const e=document.getElementById('topStatus');e.textContent=t;e.className='status-pill '+(s==='load'?'sp-load':s==='err'?'sp-err':'sp-ready');}
function showOv(i,t,s,p){document.getElementById('ovIcon').textContent=i;document.getElementById('ovTitle').textContent=t;document.getElementById('ovSub').textContent=s;document.getElementById('ovProg').style.width=p+'%';document.getElementById('overlay').classList.add('show');}
function hideOv(){document.getElementById('overlay').classList.remove('show');}
function toast(msg,type='ok'){const e=document.createElement('div');e.className=`toast t-${type}`;e.innerHTML=(type==='ok'?'✓':type==='err'?'✗':'⚠')+' '+msg;document.getElementById('toasts').appendChild(e);setTimeout(()=>e.remove(),4000);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDur(s){const m=Math.floor(s/60);return `${m}:${String(s%60).padStart(2,'0')}`;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

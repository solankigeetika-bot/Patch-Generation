<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PatchStudio — CMS QC Patch Tool</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
:root {
  --bg:#f7f8fa;--surface:#fff;--surface2:#f1f3f6;--surface3:#e8ecf2;
  --border:#e4e8ef;--border2:#d0d7e3;
  --accent:#2563eb;--accent-light:#eff4ff;--accent-dark:#1d4ed8;
  --green:#16a34a;--green-light:#f0fdf4;--green-dark:#15803d;
  --red:#dc2626;--red-light:#fef2f2;
  --orange:#ea580c;--orange-light:#fff7ed;
  --yellow:#ca8a04;--yellow-light:#fefce8;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --text:#0f172a;--text2:#334155;--muted:#64748b;--muted2:#94a3b8;
  --mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
  --r:10px;--shadow:0 1px 4px rgba(0,0,0,.08);--shadow-lg:0 4px 20px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:290px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sb-logo-text{font-size:15px;font-weight:800;letter-spacing:-.3px}
.sb-logo-text span{color:var(--accent)}
.sb-section{padding:12px 14px;border-bottom:1px solid var(--border)}
.fl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:5px}
.inp{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:11px;padding:7px 10px;outline:none;transition:border .15s;width:100%}
.inp:focus{border-color:var(--accent);background:#fff}
.inp::placeholder{color:var(--muted2)}
.row{display:flex;gap:6px;align-items:center}
.btn{font-family:var(--sans);font-weight:700;font-size:12px;padding:7px 13px;border-radius:7px;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--accent);color:#fff}.btn-p:not(:disabled):hover{background:var(--accent-dark)}
.btn-g{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}.btn-g:not(:disabled):hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--green);color:#fff}.btn-green:not(:disabled):hover{background:var(--green-dark)}
.btn-orange{background:var(--orange);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px}
.tok-status{font-family:var(--mono);font-size:9px;color:var(--muted2);margin-top:4px}
.tok-ok{color:var(--green)}
.show-cfg{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:8px}
.ep-scroll{flex:1;overflow-y:auto}
.ep-head{padding:8px 14px 4px;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.ep-item{padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.ep-item:hover{background:var(--surface2)}.ep-item.active{background:var(--accent-light);border-left:3px solid var(--accent)}
.ep-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.ep-meta{font-family:var(--mono);font-size:10px;color:var(--muted)}
.ep-badge{display:inline-block;background:var(--orange-light);color:var(--orange);font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:4px;margin-left:5px;border:1px solid #fed7aa}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:12px 22px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-pill{font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid;white-space:nowrap}
.sp-ready{background:var(--green-light);color:var(--green);border-color:#86efac}
.sp-load{background:var(--yellow-light);color:var(--yellow);border-color:#fde047;animation:blink 1s infinite}
.sp-err{background:var(--red-light);color:var(--red);border-color:#fca5a5}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.content{flex:1;overflow-y:auto;padding:18px 22px}
.stitch-ready-bar{background:linear-gradient(135deg,var(--green-light),#dcfce7);border:1.5px solid #86efac;border-radius:var(--r);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.srb-text{font-size:13px;font-weight:700;color:var(--green)}
.srb-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.final-section{background:var(--surface);border:2px solid var(--green);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;box-shadow:var(--shadow-lg)}
.final-title{font-size:14px;font-weight:700;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.final-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.upload-status{font-family:var(--mono);font-size:10px;padding:7px 12px;border-radius:6px;margin-top:8px}
.us-ok{background:var(--green-light);color:var(--green)}.us-err{background:var(--red-light);color:var(--red)}.us-load{background:var(--yellow-light);color:var(--yellow);animation:blink 1s infinite}
.op-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.op-lbl{font-family:var(--mono);font-size:10px;color:var(--muted)}
.op-count{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent)}
.remarks-grid{display:flex;flex-direction:column;gap:16px}
.rc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .2s}
.rc:hover{box-shadow:var(--shadow-lg)}.rc.rc-acc{border-color:#86efac}.rc.rc-dis{opacity:.45;border-color:#fca5a5}
.rc-hdr{padding:11px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rc-time{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-light);padding:3px 8px;border-radius:5px;border:1px solid #bfdbfe}
.rc-type{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:5px;border:1px solid}
.t-misp{background:#fef3c7;color:#92400e;border-color:#fde68a}
.t-mod{background:#ede9fe;color:#5b21b6;border-color:#ddd6fe}
.t-qual{background:#e0f2fe;color:#075985;border-color:#bae6fd}
.rc-email{font-family:var(--mono);font-size:9px;color:var(--muted);margin-left:auto}
.rc-sbadge{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:5px}
.rsb-acc{background:var(--green-light);color:var(--green);border:1px solid #86efac}
.rsb-dis{background:var(--red-light);color:var(--red);border:1px solid #fca5a5}
.rc-body{padding:14px 16px}
.note-box{background:#fffbeb;border:1px solid #fde68a;border-radius:7px;padding:9px 12px;margin-bottom:12px}
.note-lbl{font-family:var(--mono);font-size:9px;color:#92400e;letter-spacing:1px;margin-bottom:3px}
.note-txt{font-size:12px;color:#78350f;line-height:1.5}
.script-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.edit-hint{font-size:9px;color:var(--muted2);background:var(--surface2);padding:2px 6px;border-radius:4px;border:1px solid var(--border)}
.script-ta{background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;padding:9px 12px;font-size:13px;color:var(--text);line-height:1.6;outline:none;transition:all .15s;width:100%;resize:vertical;font-family:var(--sans);cursor:text;min-height:60px;-webkit-user-select:text;user-select:text;pointer-events:all}
.script-ta:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
.script-ta:hover{border-color:var(--border2);background:#fff}
.no-script{font-family:var(--mono);font-size:11px;color:var(--muted);padding:9px 12px;background:var(--surface2);border-radius:7px;border:1px solid var(--border)}
.gen-row{display:flex;align-items:center;gap:8px;margin:12px 0}
.gen-btn{font-family:var(--sans);font-weight:700;font-size:12px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;background:var(--accent);color:#fff;transition:all .15s;display:flex;align-items:center;gap:6px}
.gen-btn:not(:disabled):hover{background:var(--accent-dark);transform:translateY(-1px)}.gen-btn:disabled{opacity:.4;cursor:not-allowed}
.takes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tc{background:var(--surface2);border:2px solid var(--border);border-radius:9px;padding:12px;min-height:120px;transition:all .2s}
.tc.tk-gen{border-color:#93c5fd;background:#eff6ff;animation:blink 1s infinite}
.tc.tk-acc{border-color:var(--green);background:var(--green-light)}
.tc.tk-dis{border-color:#fca5a5;background:var(--red-light);opacity:.5}
.take-num{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
.take-spin{text-align:center;padding:18px;font-family:var(--mono);font-size:11px;color:var(--accent)}
.take-empty{text-align:center;padding:18px;font-family:var(--mono);font-size:10px;color:var(--muted2)}
.take-acts{display:flex;gap:5px;margin-top:8px}
.ta-acc{flex:1;font-family:var(--sans);font-weight:700;font-size:10px;padding:6px;border-radius:6px;border:none;cursor:pointer;background:var(--green);color:#fff}
.ta-acc:disabled{opacity:.5;cursor:not-allowed}.ta-acc:not(:disabled):hover{background:var(--green-dark)}
.ta-dis{flex:1;font-family:var(--sans);font-weight:700;font-size:10px;padding:6px;border-radius:6px;border:1px solid #fca5a5;cursor:pointer;background:var(--surface);color:var(--red)}
.ta-dis:hover{background:var(--red-light)}
.empty{text-align:center;padding:70px 30px}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:700;color:var(--text2);margin-bottom:5px}
.empty-sub{font-family:var(--mono);font-size:11px;color:var(--muted)}
.overlay{position:fixed;inset:0;background:rgba(247,248,250,.88);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px)}
.overlay.show{display:flex}
.ov-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 36px;text-align:center;box-shadow:var(--shadow-lg);max-width:300px}
.ov-icon{font-size:30px;margin-bottom:10px}
.ov-title{font-size:15px;font-weight:700;margin-bottom:4px}
.ov-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:12px}
.prog-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:2px;transition:width .4s}
.toasts{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 15px;font-family:var(--mono);font-size:11px;color:var(--text);box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:7px;animation:slideIn .25s ease;max-width:340px}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.t-ok{border-color:#86efac}.t-err{border-color:#fca5a5}.t-warn{border-color:#fde68a}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* PAGES */
.pg{display:none}.pg.active{display:block}

/* SLIM SIDEBAR */
.sidebar{width:220px}

/* SUMMARY BAR */
.sum-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;min-width:120px;box-shadow:var(--shadow)}
.sum-card .sum-val{font-size:22px;font-weight:800;color:var(--text);font-family:var(--sans)}
.sum-card .sum-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.sum-card.sc-accent .sum-val{color:var(--accent)}
.sum-card.sc-green .sum-val{color:var(--green)}
.sum-card.sc-orange .sum-val{color:var(--orange)}
.sum-card.sc-red .sum-val{color:var(--red)}
.sum-card.sc-purple .sum-val{color:var(--purple)}

/* SHOW CARDS GRID */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.show-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);transition:all .2s}
.show-card:hover{border-color:var(--accent);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.sc-body{padding:16px;cursor:pointer}
.sc-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sc-icon{width:38px;height:38px;border-radius:10px;background:var(--accent-light);border:1px solid #bfdbfe;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sc-name{font-size:14px;font-weight:700}
.sc-meta{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.sc-stats{display:flex;gap:12px;margin-top:4px}
.sc-stat{font-family:var(--mono);font-size:10px;color:var(--muted)}
.sc-stat strong{display:block;font-size:16px;font-family:var(--sans);font-weight:700;color:var(--text)}
.sc-stat.ss-green strong{color:var(--green)}
.sc-stat.ss-orange strong{color:var(--orange)}
.sc-stat.ss-red strong{color:var(--red)}
.sc-foot{padding:8px 16px;border-top:1px solid var(--border);display:flex;gap:6px}
.sc-foot .btn{flex:1;justify-content:center}
.add-card{border:2px dashed var(--border);border-radius:12px;padding:40px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .2s;min-height:160px;background:transparent}
.add-card:hover{border-color:var(--accent);background:var(--accent-light)}
.add-card .plus{font-size:28px;color:var(--muted)}
.add-card p{font-size:12px;color:var(--muted);font-family:var(--mono)}

/* EPISODE LIST IN MAIN */
.ep-grid{display:flex;flex-direction:column;gap:6px}
.ep-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px}
.ep-card:hover{border-color:var(--accent);background:var(--accent-light)}
.ep-card .ep-num{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:30px}
.ep-card .ep-info{flex:1;min-width:0}
.ep-card .ep-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ep-card .ep-dur{font-family:var(--mono);font-size:10px;color:var(--muted)}

/* BACK BUTTON */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:var(--mono);font-size:11px;padding:6px 12px;cursor:pointer;margin-bottom:16px;transition:all .15s}
.back-btn:hover{color:var(--accent);border-color:var(--accent)}

/* SE PANEL */
.se-ep{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.se-ep.se-yes{border-color:#86efac;background:var(--green-light)}
.se-ep.se-no{border-color:#fca5a5}
.se-ep-hdr{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s;flex-wrap:wrap}
.se-ep-hdr:hover{background:var(--surface2)}
.se-ep-arrow{font-size:10px;color:var(--muted);transition:transform .2s;width:16px}
.se-ep-arrow.open{transform:rotate(90deg)}
.se-ep-name{font-size:13px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.se-ep-pills{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.se-pill{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:12px;border:1px solid}
.se-pill-patches{background:var(--accent-light);color:var(--accent);border-color:#bfdbfe}
.se-pill-stitch{background:var(--green-light);color:var(--green);border-color:#86efac}
.se-pill-pending{background:var(--surface2);color:var(--muted);border-color:var(--border)}
.se-ep-body{display:none;border-top:1px solid var(--border);padding:12px 16px}
.se-ep.expanded .se-ep-body{display:block}
.se-ep.expanded .se-ep-arrow{transform:rotate(90deg)}
.se-tbl{width:100%;border-collapse:collapse;font-size:12px}
.se-tbl th{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2)}
.se-tbl td{padding:8px;border-bottom:1px solid rgba(0,0,0,.03);vertical-align:middle}
.se-tbl tr:last-child td{border-bottom:none}
.se-dl{font-family:var(--mono);font-size:10px;color:var(--accent);text-decoration:none;padding:3px 8px;border:1px solid #bfdbfe;border-radius:5px;display:inline-block}
.se-dl:hover{background:var(--accent-light)}
.se-actions{display:flex;gap:6px;padding:10px 16px;border-top:1px solid var(--border);align-items:center}
.se-yn{font-family:var(--sans);font-weight:700;font-size:11px;padding:6px 16px;border-radius:6px;border:none;cursor:pointer}
.se-yn-yes{background:var(--green);color:#fff}.se-yn-yes:hover{background:var(--green-dark)}
.se-yn-no{background:var(--surface2);color:var(--red);border:1px solid #fca5a5}.se-yn-no:hover{background:var(--red-light)}
.se-yn.active{box-shadow:0 0 0 3px rgba(0,0,0,.15)}
.se-status{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:auto}
</style>
</head>
<body>
<div class="toasts" id="toasts"></div>
<div class="overlay" id="overlay">
  <div class="ov-box">
    <div class="ov-icon" id="ovIcon">⏳</div>
    <div class="ov-title" id="ovTitle">Processing...</div>
    <div class="ov-sub" id="ovSub">Please wait</div>
    <div class="prog-bg"><div class="prog-fill" id="ovProg" style="width:0%"></div></div>
  </div>
</div>

<div class="app">
<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon">🎙</div>
    <div>
      <div class="sb-logo-text">Patch<span>Studio</span></div>
      <div style="font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:1px">CMS QC PATCH GENERATOR</div>
    </div>
  </div>

  <div class="sb-section">
    <label class="fl">CMS Credentials</label>
    <div class="tok-status" id="tokStatus" style="margin-bottom:6px">Not connected</div>
    <div style="text-align:center;margin-bottom:4px" id="bookmarkletWrap"></div>
    <div style="font-family:var(--mono);font-size:8px;color:var(--muted2);text-align:center;line-height:1.4">Drag button to bookmarks bar.<br>Click on CMS site to connect.</div>
    <script>
    (function(){
      var b=document.location.href.split('?')[0].split('#')[0];

// ── IndexedDB ────────────────────────────────────────────────
async function initDB() {
  return new Promise((res,rej)=>{
    const req = indexedDB.open(DB_NAME,2);
    req.onupgradeneeded = e => {
      const d=e.target.result;
      if(!d.objectStoreNames.contains('patches')) d.createObjectStore('patches',{keyPath:'k'});
      if(!d.objectStoreNames.contains('config'))  d.createObjectStore('config', {keyPath:'k'});
    };
    req.onsuccess = e => { db=e.target.result; res(db); };
    req.onerror   = e => rej(e);
  });
}
async function dbSet(store,k,v){
  if(!db){ localStorage.setItem('ps_'+store+'_'+k, JSON.stringify(v)); return; }
  return new Promise((res,rej)=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).put({k,v}); tx.oncomplete=res; tx.onerror=()=>{ localStorage.setItem('ps_'+store+'_'+k, JSON.stringify(v)); res(); }; });
}
async function dbGet(store,k){
  if(!db){ try{ return JSON.parse(localStorage.getItem('ps_'+store+'_'+k)); }catch(e){ return null; } }
  return new Promise((res,rej)=>{ const tx=db.transaction(store,'readonly'); const r=tx.objectStore(store).get(k); r.onsuccess=e=>res(e.target.result?.v); r.onerror=()=>{ try{ res(JSON.parse(localStorage.getItem('ps_'+store+'_'+k))); }catch(e){ res(null); } }; });
}
async function dbSetBlob(k,blob){
  if(!db) return;
  return new Promise((res,rej)=>{ const tx=db.transaction('patches','readwrite'); tx.objectStore('patches').put({k,v:blob}); tx.oncomplete=res; tx.onerror=()=>res(); });
}
async function dbGetBlob(k){
  if(!db) return null;
  return new Promise((res)=>{ const tx=db.transaction('patches','readonly'); const r=tx.objectStore('patches').get(k); r.onsuccess=e=>res(e.target.result?.v||null); r.onerror=()=>res(null); });
}

};

async function pasteCredentials(){
  try{
    const text=await navigator.clipboard.readText();
    if(!text){ toast('Clipboard is empty','warn'); return; }
    // Expect format: token|uid
    const parts=text.split('|');
    if(parts.length===2 && parts[0].length>20 && parts[1].length>20){
      authToken=parts[0].trim(); uid=parts[1].trim();
      localStorage.setItem('ps_token', authToken);
      localStorage.setItem('ps_uid', uid);
      document.getElementById('tokenInp').value=authToken;
      document.getElementById('uidInp').value=uid;
      setTokOk(true);
      toast('Credentials pasted and saved!','ok');
    } else {
      toast('Invalid format. Expected token|uid from bookmarklet.','warn');
    }
  }catch(e){
    toast('Clipboard access denied. Allow clipboard permission.','warn');
  }
}

async function initShows(){
  // Real-time listener: whenever any client writes shows, everyone gets updated
  fbDb.ref('shows').on('value', snapshot => {
    shows = snapshot.val() ? Object.values(snapshot.val()) : [];
    renderDashboard();
    renderSidebarNav();
  });

  // One-time migration: push local shows to Firebase if Firebase is empty
  const localShows = await dbGet('config','shows') || [];
  if(localShows.length){
    const snap = await fbDb.ref('shows').once('value');
    if(!snap.val()){
      const obj = {};
      localShows.forEach(s => obj[s.id] = s);
      await fbDb.ref('shows').set(obj);
    }
  }
}

// ── Error Summary ───────────────────────────────────────────
async function loadErrorSummary(){
  const el=document.getElementById('errorSummary');
  if(!el) return;
  el.innerHTML='<div style="font-size:12px;color:var(--muted);padding:12px">Loading error summary...</div>';

  try{
    const remarksSnap=await fbDb.ref('episodeRemarks').once('value');
    const allRemarks=remarksSnap.val()||{};
    const epsSnap=await fbDb.ref('showEpisodes').once('value');
    const allEps=epsSnap.val()||{};

    // Build show→episodes mapping
    const showMap={};
    for(const s of shows){
      const sid=s.showInput?.match(/show_id=([a-f0-9]+)/i)?.[1]||s.showInput||s.id;
      showMap[String(s.id)]={name:s.name, showInput:sid, voiceName:s.voiceName||'', voiceGender:s.voiceGender||'', episodes:0, totalErrors:0, errorTypes:{}, qcTillEp:0, epWithQC:0};
    }

    // Count episodes per show and find max episode with QC/ready-to-master
    // Build chapId→seq mapping and find QC'd Till Ep from qcCount
    const chapSeqMap={};
    for(const [showId, eps] of Object.entries(allEps)){
      const epArr=Array.isArray(eps)?eps:Object.values(eps||{});
      const match=Object.values(showMap).find(sm=>sm.showInput===showId);
      if(match){
        const validEps=epArr.filter(e=>e);
        match.episodes=validEps.length;
        for(const ep of validEps){
          if(ep.chapter_id) chapSeqMap[ep.chapter_id]=ep.natural_sequence_number||ep.seq_number||0;
          const seq=ep.natural_sequence_number||ep.seq_number||0;
          // QC'd = episode has QC remarks (qcCount > 0)
          if(ep.qcCount>0&&seq>match.qcTillEp) match.qcTillEp=seq;
        }
      }
    }

    // Aggregate error types from episodeRemarks and find QC'd Till Ep
    for(const [chapId, epData] of Object.entries(allRemarks)){
      if(!epData?.remarks) continue;
      const remarks=Array.isArray(epData.remarks)?epData.remarks:Object.values(epData.remarks||{});
      if(!remarks.length) continue;
      const showId=epData.showId||'';
      const match=Object.values(showMap).find(sm=>sm.showInput===showId);
      const target=match||{errorTypes:{},totalErrors:0,epWithQC:0,qcTillEp:0};

      if(match){
        match.epWithQC++;
        // Find episode sequence number from cached episodes
        const seq=chapSeqMap[chapId]||0;
        if(seq>match.qcTillEp) match.qcTillEp=seq;
      }

      for(const r of remarks){
        if(!r) continue;
        const type=(r.issueType||'Unknown').trim();
        if(!target.errorTypes[type]) target.errorTypes[type]=0;
        target.errorTypes[type]++;
        target.totalErrors++;
      }
      if(match){
        match.errorTypes=target.errorTypes;
        match.totalErrors=target.totalErrors;
      }
    }

    // Build all unique error types
    const allTypes=new Set();
    for(const sm of Object.values(showMap)) for(const t of Object.keys(sm.errorTypes)) allTypes.add(t);
    const typeArr=[...allTypes].sort();

    if(!typeArr.length){
      el.innerHTML='<div style="font-size:12px;color:var(--muted);padding:12px">No QC data available yet. Load episodes from CMS to populate error summary.</div>';
      return;
    }

    // Render table
    let html=`<div style="margin:16px 0">
      <div style="font-size:14px;font-weight:800;margin-bottom:10px;color:var(--text)">QC Error Summary</div>
      <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:11px;font-family:var(--mono)">
        <thead><tr style="background:var(--surface2);border-bottom:2px solid var(--border)">
          <th style="padding:8px 10px;text-align:left;color:var(--text2)">Show</th>
          <th style="padding:8px 10px;text-align:center;color:var(--text2)">Voice</th>
          <th style="padding:8px 10px;text-align:center;color:var(--text2)">M/F</th>
          <th style="padding:8px 10px;text-align:center;color:var(--text2)">Episodes</th>
          <th style="padding:8px 10px;text-align:center;color:var(--text2);background:#E8F5E9">QC'd Till Ep</th>
          <th style="padding:8px 10px;text-align:center;color:var(--text2)">Total Errors</th>
          <th style="padding:8px 10px;text-align:center;color:var(--text2);background:#FFF3E0">Errors/Ep</th>
          ${typeArr.map(t=>`<th style="padding:8px 10px;text-align:center;color:var(--text2)">${esc(t)}</th>`).join('')}
        </tr></thead>
        <tbody>`;

    const pctFn=(n,total)=>total?Math.round(n/total*100):0;

    for(const sm of Object.values(showMap)){
      html+=`<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:8px 10px;font-weight:600;color:var(--text)">${esc(sm.name)}</td>
        <td style="padding:8px 10px;text-align:center;font-size:10px">${esc(sm.voiceName)||'—'}</td>
        <td style="padding:8px 10px;text-align:center;font-weight:700;color:${sm.voiceGender==='F'?'#E91E63':'#1565C0'}">${esc(sm.voiceGender)||'—'}</td>
        <td style="padding:8px 10px;text-align:center">${sm.episodes||'—'}</td>
        <td style="padding:8px 10px;text-align:center;font-weight:700;color:var(--green);background:#E8F5E9">${sm.qcTillEp||'—'}</td>
        <td style="padding:8px 10px;text-align:center;font-weight:700;color:var(--orange)">${sm.totalErrors||0}</td>
        <td style="padding:8px 10px;text-align:center;font-weight:700;background:#FFF3E0">${sm.qcTillEp?Math.round(sm.totalErrors/sm.qcTillEp*10)/10:'—'}</td>
        ${typeArr.map(t=>{const c=sm.errorTypes[t]||0;const p=pctFn(c,sm.totalErrors);return `<td style="padding:8px 10px;text-align:center;${c?'color:var(--red);font-weight:700':''}">${c}${c?` <span style="font-weight:400;font-size:9px;color:var(--muted)">(${p}%)</span>`:''}</td>`;}).join('')}
      </tr>`;
    }

    // Totals row
    const grandTotal=Object.values(showMap).reduce((s,m)=>s+m.totalErrors,0);
    html+=`<tr style="border-top:2px solid var(--border);background:var(--surface2);font-weight:800">
      <td style="padding:8px 10px">TOTAL</td>
      <td style="padding:8px 10px"></td>
      <td style="padding:8px 10px"></td>
      <td style="padding:8px 10px;text-align:center">${Object.values(showMap).reduce((s,m)=>s+(m.episodes||0),0)}</td>
      <td style="padding:8px 10px;text-align:center;background:#E8F5E9"></td>
      <td style="padding:8px 10px;text-align:center;color:var(--orange)">${grandTotal}</td>
      <td style="padding:8px 10px;text-align:center;background:#FFF3E0;font-weight:700">${(()=>{const totalQcEp=Object.values(showMap).reduce((s,m)=>s+(m.qcTillEp||0),0);return totalQcEp?Math.round(grandTotal/totalQcEp*10)/10:'—';})()}</td>
      ${typeArr.map(t=>{const c=Object.values(showMap).reduce((s,m)=>s+(m.errorTypes[t]||0),0);const p=pctFn(c,grandTotal);return `<td style="padding:8px 10px;text-align:center;color:var(--red)">${c} <span style="font-weight:400;font-size:9px;color:var(--muted)">(${p}%)</span></td>`;}).join('')}
    </tr>`;

    html+=`</tbody></table></div></div>`;
    el.innerHTML=html;
  }catch(e){
    console.error('Error summary failed:',e);
    el.innerHTML='<div style="font-size:12px;color:var(--red);padding:12px">Failed to load error summary: '+e.message+'</div>';
  }
}

// ── Dictionary ──────────────────────────────────────────────
function classifyWord(word, scriptLine, note){
  const w=(word||'').toLowerCase();
  // Common French verb endings
  if(/(?:aient|ent|ait|ont|rent|ient|irent|[eè]rent|ir|er|oir|re|ais|ez|ons|ût|ît)$/i.test(w)) return 'Verb';
  // Interjections
  if(/^(ah|oh|hein|haha|hmm|euh|bah|tiens|voil[aà]|h[ée]las|allons|parbleu|zut|mince|sacr[ée])$/i.test(w)) return 'Interjection';
  // Figures of speech / expressions (multi-word or idiomatic)
  if(w.includes(' ')||w.includes('-')&&w.split('-').length>2) return 'Expression';
  // Adjectives (common French endings)
  if(/(?:eux|euse|ique|able|ible|aire|el|elle|if|ive|oux|al|ale|ien|ienne)$/i.test(w)) return 'Adjective';
  // Adverbs
  if(/(?:ment|emment|amment)$/i.test(w)&&w.length>6) return 'Adverb';
  // Proper nouns (capitalized)
  if(word && word[0]===word[0].toUpperCase() && word[0]!==word[0].toLowerCase()) return 'Proper Noun';
  // Common noun patterns
  if(/(?:tion|sion|ment|eur|ence|ance|age|isme|iste|esse|ure|oir|eau|ée|té)$/i.test(w)) return 'Noun';
  // Default
  return 'Noun';
}

    summaryHtml+=`<tr style="border-top:2px solid var(--border);background:var(--surface2);font-weight:800">

function downloadDictCSV(){
  const sel=document.getElementById('dictShowFilter')?.value||'all';
  const data=sel==='all'?(window._dictData||[]):((window._dictByShow||{})[sel]?.entries||[]);
  if(!data.length){toast('No data to download','warn');return;}
  const headers=['Correct Grammatical Spelling','Phonetically Correct Spelling','Classification','Show','Episode','Time','QC Note','Agent'];
  const rows=data.map(e=>[e.word,e.phonetic,e.classification,e.show,e.episode,e.time,e.note,e.agent].map(v=>'"'+(v||'').replace(/"/g,'""')+'"').join(','));
  const csv=[headers.join(','),...rows].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='mispronunciation_dictionary'+(sel!=='all'?'_'+sel.replace(/[^a-zA-Z0-9]/g,'_'):'')+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('Downloaded dictionary CSV','ok');
}

function renderEpCards(){
  const el=document.getElementById('showEpList');
  if(!episodes.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📂</div><div class="empty-title">No episodes loaded</div></div>';
    return;
  }

  // Sort by sequence number (ascending)
  const sorted=[...episodes].sort((a,b)=>{
    const seqA=a.natural_sequence_number||(a.chapter_details?.seq_number)||999;
    const seqB=b.natural_sequence_number||(b.chapter_details?.seq_number)||999;
    return seqA-seqB;
  });

  // Filter
  const filtered=sorted.filter((ep,i)=>{
    const cd=ep.chapter_details||ep;
    const title=(cd.chapter_title||ep.chapter_title||'').toLowerCase();
    const hasQC=cd.hasQC||cd.qcCount>0||String(cd.audio_status||'').includes('issue');
    if(epFilterMode==='qc'&&!hasQC) return false;
    if(epFilter&&!title.includes(epFilter)&&!String(ep.natural_sequence_number).includes(epFilter)) return false;
    return true;
  });

  const countEl=document.getElementById('epFilterCount');
  if(countEl) countEl.textContent=`${filtered.length} of ${episodes.length} episodes`;

  el.innerHTML=filtered.map((ep)=>{
    const cd=ep.chapter_details||ep;
    const hasQC=cd.hasQC||cd.qcCount>0||String(cd.audio_status||'').includes('issue');
    const qcCount=cd.qcCount||0;
    const cid=cd.chapter_id||ep.chapter_id||'';
    const title=cd.chapter_title||ep.chapter_title||'Episode';
    const dur=ep.audio_duration||cd.audio_duration||0;
    const seq=ep.natural_sequence_number||(cd.seq_number)||'';
    const statusText=hasQC?`${qcCount} QC issue${qcCount!==1?'s':''}`:String(cd.audio_status||'').replace(/_/g,' ');
    return `<div class="ep-card" onclick="loadChapter('${cid}',0)" style="${hasQC?'border-left:3px solid var(--orange)':''}">
      <div class="ep-num">${seq?'#'+seq:''}</div>
      <div class="ep-info">
        <div class="ep-name">${esc(title)}${hasQC?'<span class="ep-badge">'+qcCount+' QC</span>':''}</div>
        <div class="ep-dur">${dur?fmtDur(dur):''} ${statusText!=='pending'?statusText:''}</div>
      </div>
    </div>`;
  }).join('');
}

let seActiveShowId=null; // which show is expanded in SE panel

function pct(n,d){ return d>0?Math.round(n/d*100):0; }
function pctBar(val,color){ return `<div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px"><div style="height:100%;width:${val}%;background:${color};border-radius:2px"></div></div>`; }

function renderSEPanel(){
  const seData=getSEData();
  const epIds=Object.keys(seData);

  // Global pipeline counts
  let totalPatches=0, reviewedPatches=0, stitchedPatches=0, qcDoneEps=0, uploadedEps=0;
  epIds.forEach(id=>{
    const ep=seData[id];
    const patches=ep.patches||[];
    totalPatches+=patches.length;
    reviewedPatches+=patches.length;
    stitchedPatches+=patches.filter(p=>p.stitched==='yes').length;
    if(ep.qcDone) qcDoneEps++;
    if(ep.uploadedCMS) uploadedEps++;
  });

  document.getElementById('seSummary').innerHTML=`
    <div class="sum-bar">
      <div class="sum-card"><div class="sum-val">${totalPatches}</div><div class="sum-lbl">Patches Required</div></div>
      <div class="sum-card sc-accent"><div class="sum-val">${reviewedPatches}</div><div class="sum-lbl">Reviewed</div></div>
      <div class="sum-card sc-green"><div class="sum-val">${stitchedPatches}</div><div class="sum-lbl">Stitched</div></div>
      <div class="sum-card sc-purple"><div class="sum-val">${qcDoneEps}</div><div class="sum-lbl">Eps QC Done</div></div>
      <div class="sum-card sc-orange"><div class="sum-val">${uploadedEps}</div><div class="sum-lbl">Uploaded</div></div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted)">Pipeline:</div>
      <div style="display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px">
        <span style="color:var(--text);font-weight:700">${totalPatches}</span> Required
        <span style="color:var(--muted)">→</span>
        <span style="color:var(--accent);font-weight:700">${reviewedPatches}</span> Reviewed
        <span style="color:var(--muted)">→</span>
        <span style="color:var(--green);font-weight:700">${stitchedPatches}</span> Stitched
        <span style="color:var(--muted)">→</span>
        <span style="color:var(--purple);font-weight:700">${qcDoneEps}</span> Eps QC'd
        <span style="color:var(--muted)">→</span>
        <span style="color:var(--orange);font-weight:700">${uploadedEps}</span> Uploaded
      </div>
    </div>`;

  if(!shows.length&&!epIds.length){
    document.getElementById('seList').innerHTML=`<div class="empty"><div class="empty-icon">🎧</div><div class="empty-title">No episodes processed yet</div><div class="empty-sub">Load a show → open an episode → generate & accept patches → they'll appear here</div></div>`;
    return;
  }

  // Group episodes by show — match showId against shows list
  const showGroups={};
  function findShowForId(sid){
    if(!sid) return null;
    return shows.find(s=>s.showInput===sid || s.showInput?.includes(sid) || String(s.id)===sid);
  }
  shows.forEach(s=>{
    const key=s.showInput||String(s.id);
    if(!showGroups[key]) showGroups[key]={show:s, episodes:[]};
  });
  epIds.forEach(chapId=>{
    const ep=seData[chapId];
    const showId=ep.showId||'unknown';
    const matchedShow=findShowForId(showId);
    const groupKey=matchedShow?(matchedShow.showInput||String(matchedShow.id)):showId;
    if(!showGroups[groupKey]) showGroups[groupKey]={show:matchedShow||{name:showId.substring(0,20)+'...',showInput:showId}, episodes:[]};
    showGroups[groupKey].episodes.push({chapId,...ep});
  });

  // If a show is selected, show its episodes detail
  if(seActiveShowId && showGroups[seActiveShowId]){
    renderSEShowDetail(showGroups[seActiveShowId]);
    return;
  }

  // Show cards view
  document.getElementById('seList').innerHTML=`<div class="dash-grid">${Object.entries(showGroups).map(([showId,group])=>{
    const eps=group.episodes;
    if(!eps.length) return '';

async function downloadAllPatches(chapId){
  const seData=getSEData();
  const ep=seData[chapId];
  if(!ep?.patches?.length){toast('No patches to download','warn');return;}
  const patchesWithAudio=ep.patches.filter(p=>p.audioBase64&&p.time);
  if(!patchesWithAudio.length){toast('No audio available','warn');return;}
  toast('Placing '+patchesWithAudio.length+' patches at timestamps...','ok');

  try{
    // Decode all patches and parse their timestamps
    const items=[];
    for(const p of patchesWithAudio){
      const resp=await fetch(p.audioBase64);
      const blob=await resp.blob();
      const buf=await blobToAudioBuf(blob);
      const startSec=parseTime(p.time);
      items.push({buf, startSec});
    }
    // Sort by timestamp
    items.sort((a,b)=>a.startSec-b.startSec);

    // Get target sample rate and channels from first buffer
    const sr=items[0].buf.sampleRate, ch=items[0].buf.numberOfChannels;

    // Calculate total length: last patch start + its duration
    const lastItem=items[items.length-1];
    const totalSec=lastItem.startSec+lastItem.buf.duration+0.5;
    const totalLen=Math.ceil(totalSec*sr);

    const outCtx=new OfflineAudioContext(ch,totalLen,sr);
    for(const item of items){
      const matched=matchBuf(item.buf,sr,ch);
      const src=outCtx.createBufferSource();
      src.buffer=matched;
      src.connect(outCtx.destination);
      src.start(item.startSec);
    }
    const rendered=await outCtx.startRendering();
    const wav=bufToWav(rendered);
    const url=URL.createObjectURL(wav);

    // Trigger download
    const a=document.createElement('a');
    a.href=url;
    a.download='all_patches_'+(ep.title||'episode').replace(/[^a-zA-ZÀ-ÿ0-9 ]/g,'').replace(/ /g,'_')+'.wav';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    toast('Downloaded patches at timestamps','ok');
  }catch(e){
    toast('Failed to combine: '+e.message,'err');
    console.error(e);
  }
}

function saveSEData(chapId, title, patchesData, stitchedUrl){
  const seData=getSEData();
  const existing=seData[chapId]?.patches||[];
  // Strip blobUrl (local blob) but keep audioBase64 for Firebase sharing
  const mergedPatches=(patchesData||[]).map((p,i)=>{
    const {blobUrl, ...rest} = p;
    // Match existing patch by time code for correct audio/stitch preservation
    const match=existing.find(ep=>ep.time===p.time)||existing[i]||{};
    return {...rest, audioBase64: p.audioBase64||match.audioBase64||null, stitched: match.stitched||p.stitched||''};
  });
  // If no patches and no stitched URL, remove episode from SE data entirely
  if(!mergedPatches.length && !stitchedUrl && !seData[chapId]?.stitchedUrl){
    fbDb.ref('seData/'+chapId).remove();
    return;
  }
  const epData={
    title,
    showId: activeShowId||seData[chapId]?.showId||'',
    patches:mergedPatches,
    stitchedUrl: stitchedUrl||seData[chapId]?.stitchedUrl||null,
    qcDone: seData[chapId]?.qcDone||false,
    uploadedCMS: seData[chapId]?.uploadedCMS||false,
    updatedAt:Date.now()
  };
  fbDb.ref('seData/'+chapId).set(epData);
}

async function loadShow(directInput, forceRefresh){
  let input=directInput||document.getElementById('showInp').value.trim();
  asKey=document.getElementById('asKeyInp').value.trim();
  asVoice=document.getElementById('asVoiceInp').value.trim();
  voiceType=document.getElementById('voiceType').value;

  const m=input.match(/show_id=([a-f0-9]+)/i)||input.match(/id=([a-f0-9]{30,})/i);
  activeShowId=m?m[1]:input;
  console.log('loadShow input:', input, '→ activeShowId:', activeShowId);
  if(!activeShowId){toast('Enter a valid show ID or URL','warn');return;}

  // Try loading from Firebase cache first (no CMS login needed)
  if(!forceRefresh){
    const snap = await fbDb.ref('showEpisodes/'+activeShowId).once('value');
    const rawCached = snap.val();
    const cached = rawCached ? (Array.isArray(rawCached) ? rawCached : Object.values(rawCached)) : [];
    if(cached.length){
      episodes = cached.filter(ep=>ep).map(ep=>({chapter_details:ep, audio_duration:ep.audio_duration, natural_sequence_number:ep.natural_sequence_number}));
      document.getElementById('topTitle').textContent = activeShowConfig?.name||'Show';
      renderShowView();
      setStatus('ready', `${episodes.length} eps (cached)`);
      toast(`Loaded ${episodes.length} episodes from cache`,'ok');
      return;
    }
  }

  // Need CMS credentials to fetch fresh data
  if(!authToken||!uid){toast('No cached data. Connect CMS credentials to load episodes.','warn');return;}

  setStatus('load','Loading...');
  document.getElementById('showEpList').innerHTML='<div class="empty"><div class="empty-icon">⏳</div><div class="empty-title">Loading episodes...</div></div>';

  try{
    const r=await fetch(`${CMS_BASE}/book.show_episodes?show_id=${activeShowId}&view=cms&is_novel=0&paginate_chapters=true&page_no=1`,{headers:hdrs()});
    if(!r.ok) throw new Error(`HTTP ${r.status} — check token`);
    const d=await r.json(), res=d.result;
    const showTitle = res.show_title || activeShowId;
    document.getElementById('topTitle').textContent = showTitle;
    let eps = res.episodes || [];

    let page = 2, keepGoing = true;
    while(keepGoing && page <= 100){
      try{
        const rp = await fetch(`${CMS_BASE}/book.show_episodes?show_id=${activeShowId}&view=cms&is_novel=0&paginate_chapters=true&page_no=${page}`, {headers:hdrs()});
        if(!rp.ok){ keepGoing=false; break; }
        const dp = await rp.json();
        const pageEps = dp.result?.episodes || [];
        if(!pageEps.length){ keepGoing=false; break; }
        eps = [...eps, ...pageEps];
        page++;
        if(pageEps.length < 5) break;
      } catch(e){ break; }
    }

    episodes = eps;

    // Bulk-load episode details to detect QC issues (batches of 5)
    setStatus('load', 'Checking QC status...');
    document.getElementById('showEpList').innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Checking QC status...</div><div class="empty-sub" id="bulkProgress">0/${eps.length} episodes</div></div>`;
    let qcCount=0;
    const BATCH=5;
    for(let b=0; b<eps.length; b+=BATCH){
      const batch=eps.slice(b, b+BATCH);
      await Promise.allSettled(batch.map(async ep=>{
        const cd=ep.chapter_details||ep;
        const chapId=cd.chapter_id||ep.chapter_id||'';
        if(!chapId) return;
        try{
          const dr=await fetch(`${CMS_BASE}/book.episode_details?chapter_id=${chapId}&is_novel=0`,{headers:hdrs()});
          if(!dr.ok) return;
          const dd=await dr.json();
          const ch=dd.result?.chapter_details;
          if(!ch) return;
          const qcDetails=ch.qc_details||[];
          // Enrich the episode object with QC info
          if(!ep.chapter_details) ep.chapter_details=cd;
          ep.chapter_details.qcCount=qcDetails.length;
          ep.chapter_details.hasQC=qcDetails.length>0;
          ep.chapter_details.audio_status=ch.audio_status||cd.audio_status||'';
          if(qcDetails.length>0){
            qcCount++;
            // Save QC remarks to Firebase for error summary and dictionary
            const remarkData=qcDetails.map((qc,i)=>({
              idx:i, time:qc.time, issueType:qc.issue_type||'',
              userEmail:qc.user_email||'', scriptLine:extractLine(qc.remarks),
              note:extractNote(qc.remarks), rawRemarks:qc.remarks,
              needsPatch:!!extractLine(qc.remarks),
            }));
            fbDb.ref('episodeRemarks/'+chapId).set({
              title:ch.chapter_title||'Episode', showId:activeShowId,
              remarks:remarkData, updatedAt:Date.now()
            });
          }
        }catch(e){}
      }));
      const done=Math.min(b+BATCH, eps.length);
      const progEl=document.getElementById('bulkProgress');
      if(progEl) progEl.textContent=`${done}/${eps.length} episodes`;
    }

    // Save stats + enriched episode list to Firebase
    if(activeShowConfig){
      activeShowConfig.stats = {...(activeShowConfig.stats||{}), total: eps.length, qc: qcCount};
      await fbDb.ref('shows/'+activeShowConfig.id+'/stats').set(activeShowConfig.stats);
      const epData = eps.map(ep=>{
        const cd=ep.chapter_details||ep;
        return {
          chapter_id: cd.chapter_id||ep.chapter_id||'',
          chapter_title: cd.chapter_title||ep.chapter_title||'',
          audio_status: cd.audio_status||ep.audio_available||'',
          audio_duration: ep.audio_duration||cd.audio_duration||0,
          natural_sequence_number: ep.natural_sequence_number||cd.seq_number||0,
          qcCount: cd.qcCount||0,
          hasQC: cd.hasQC||false,
        };
      });
      await fbDb.ref('showEpisodes/'+activeShowId).set(epData);
    }
    renderShowView();
    setStatus('ready', `${episodes.length} eps loaded — ${qcCount} with QC issues`);
    toast(`Loaded: ${showTitle} — ${episodes.length} episodes, ${qcCount} with QC`, 'ok');
  }catch(e){
    setStatus('err','Error'); toast('Load failed: '+e.message,'err');
    document.getElementById('showEpList').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">${esc(e.message)}</div></div>`;
  }
}

async function loadChapter(chapId, idx){
  if(!chapId){ return; }
  console.log('loadChapter START', chapId);
  goPage('episode');
  setStatus('load','Loading...'); showOv('⏳','Loading Episode','Fetching QC remarks...',0);

  try{
    // Try Firebase cache first (no CMS login needed)
    const fbSnap = await fbDb.ref('episodeRemarks/'+chapId).once('value');
    const fbData = fbSnap.val();

    if(!authToken||!uid){
      // No CMS credentials — use Firebase cache only
      if(!fbData){
        hideOv(); toast('No cached data. Someone with CMS access needs to load this episode first.','warn'); return;
      }
      activeEp={chapter_id:chapId, chapter_title:fbData.title}; finalAudioUrl=null; finalAudioBlob=null; RS={};
      remarks = (fbData.remarks||[]).map((r,i)=>({...r, idx:i}));

      // Load accepted patch audio from SE data in Firebase
      const seSnap = await fbDb.ref('seData/'+chapId).once('value');
      const seEp = seSnap.val();
      const sePatches = seEp?.patches||[];

      const fbDisps=fbData.dispositions||{};
      for(const r2 of remarks){
        RS[r2.idx]={scriptLine:r2.scriptLine,takes:[null,null,null],acceptedTake:-1,discarded:[],status:'idle',disposition:fbDisps[r2.idx]||''};
        // Find matching SE patch by time code and populate the accepted take
        const matchedPatch = sePatches.find(p=>p.time===r2.time);
        if(matchedPatch && matchedPatch.audioBase64){
          RS[r2.idx].takes[0] = matchedPatch.audioBase64;
          RS[r2.idx].acceptedTake = 0;
          RS[r2.idx].status = 'accepted';
        }
      }
      document.getElementById('topTitle').textContent=fbData.title||'Episode';
      document.getElementById('genAllBtn').style.display='none';
      renderContent();
      setStatus('ready',`${remarks.filter(r2=>r2.needsPatch).length} patches (cached)`);
      hideOv(); toast(`Loaded from cache: ${fbData.title}`,'ok');
      return;
    }

    // Has CMS credentials — fetch fresh from API
    console.log('Fetching episode details...');
    const r=await fetch(`${CMS_BASE}/book.episode_details?chapter_id=${chapId}&is_novel=0`,{headers:hdrs()});
    console.log('Fetch status:', r.status);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d=await r.json(), ch=d.result?.chapter_details;
    if(!ch) throw new Error('No chapter_details');
    activeEp=ch; activeEp.book_id = ch.book_id || ''; finalAudioUrl=null; finalAudioBlob=null; RS={};

    // Use show config voice (user's choice) — only auto-detect if no voice is configured
    const cmsVoice = ch.text_to_speech_details?.assigned_voice_id || '';
    if(cmsVoice && !activeShowConfig?.voiceId){
      asVoice = cmsVoice;
      document.getElementById('asVoiceInp').value = cmsVoice;
      toast('Voice auto-set from CMS: ' + cmsVoice, 'ok');
    }

    // Store tts job details for later use
    activeEp._ttsJobDetails = ch.text_to_speech_details || null;
    activeEp._bookId = ch.book_id || '';

    remarks=(ch.qc_details||[]).map((qc,i)=>({
      idx:i, time:qc.time, issueType:qc.issue_type||'',
      userEmail:qc.user_email||'', timestamp:qc.timestamp||'',
      audioStatus:qc.audio_status||'', cmsStatus:qc.status||'pending',
      scriptLine:extractLine(qc.remarks), note:extractNote(qc.remarks),
      rawRemarks:qc.remarks, needsPatch:!!extractLine(qc.remarks),
    }));

    const fbDisps2=fbData?.dispositions||{};
    for(const r2 of remarks){
      RS[r2.idx]={scriptLine:r2.scriptLine,takes:[null,null,null],acceptedTake:-1,discarded:[],status:'idle',disposition:fbDisps2[r2.idx]||await dbGet('config',`${chapId}_r${r2.idx}_disp`)||''};
      for(let t=0;t<3;t++){
        const blob=await dbGetBlob(`${chapId}_r${r2.idx}_t${t}`);
        if(blob) RS[r2.idx].takes[t]=URL.createObjectURL(blob);
        if(RS[r2.idx].takes[t]) RS[r2.idx].status='done';
      }
      const acc=await dbGet('config',`${chapId}_r${r2.idx}_acc`);
      if(acc!=null && acc>=0){ RS[r2.idx].acceptedTake=acc; RS[r2.idx].status='accepted'; }
    }

    // Fallback: load accepted patches from Firebase SE data if not found locally
    const seSnap2=await fbDb.ref('seData/'+chapId).once('value');
    const seEp2=seSnap2.val();
    const sePatches2=seEp2?.patches||[];
    console.log('Firebase SE fallback:', sePatches2.length, 'patches found');
    let fbRestored=0;
    for(const r2 of remarks){
      const st=RS[r2.idx];
      // Restore from Firebase if: no local takes at all, OR accepted but audio blob is missing/dead
      const hasValidAudio=st.takes.some(t=>t&&!t.startsWith('blob:'));
      const hasLocalBlob=st.takes.some(t=>t&&t.startsWith('blob:'));
      const needsRestore=!hasValidAudio||(st.acceptedTake>=0&&hasLocalBlob);
      if(needsRestore||!st.takes.some(t=>t)){
        const matchedPatch=sePatches2.find(p=>p.time===r2.time);
        if(matchedPatch&&matchedPatch.audioBase64){
          st.takes[0]=matchedPatch.audioBase64;
          st.acceptedTake=0;
          st.status='accepted';
          fbRestored++;
        }
      }
    }
    if(fbRestored) console.log('Restored',fbRestored,'patches from Firebase');

    // Save QC remarks to Firebase so others can see without CMS login
    const remarkData = remarks.map(r2=>({
      idx:r2.idx, time:r2.time, issueType:r2.issueType,
      userEmail:r2.userEmail, scriptLine:r2.scriptLine,
      note:r2.note, rawRemarks:r2.rawRemarks, needsPatch:r2.needsPatch,
    }));
    await fbDb.ref('episodeRemarks/'+chapId).set({
      title: ch.chapter_title||'Episode',
      showId: activeShowId,
      remarks: remarkData,
      updatedAt: Date.now()
    });

    // Fetch and parse episode script (.docx) for context
    episodeScript=[];
    if(ch.file_url){
      try{
        showOv('📄','Loading Script','Parsing episode script...',80);
        const docxResp=await fetch(ch.file_url);
        if(docxResp.ok){
          const docxBuf=await docxResp.arrayBuffer();
          const result=await mammoth.extractRawText({arrayBuffer:docxBuf});
          episodeScript=result.value.split('\n').map(l=>l.trim()).filter(l=>l.length>5);
          console.log('Script parsed:',episodeScript.length,'lines');
        }
      }catch(e){ console.warn('Could not parse .docx:',e); }
    }

    document.getElementById('topTitle').textContent=ch.chapter_title||'Episode';
    document.getElementById('genAllBtn').style.display='inline-flex';
    updateStitchBtn(); renderContent();
    setStatus('ready',`${remarks.filter(r2=>r2.needsPatch).length} patches needed`);
    hideOv(); toast(`Loaded: ${ch.chapter_title}`,'ok');
  }catch(e){
    setStatus('err','Error'); hideOv(); toast('Load failed: '+e.message,'err');
  }
}

// ── Extract Helpers ──────────────────────────────────────────
function extractLine(remarks){
  if(!remarks) return '';
  const OPEN=['"','\u201c','\u00ab','\u2018','\u201e'];
  const CLOSE=['"','\u201d','\u00bb','\u2019','\u201d'];
  // Handle all variants: "Line from script", "Line from Script" with -, --, em-dash, colon
  const m=remarks.match(/[Ll]ine\s+from\s+[Ss]cript\s*[\-\u2013\u2014:]+\s*/);
  if(m){
    const after=remarks.slice(m.index+m[0].length);
    for(let i=0;i<OPEN.length;i++){
      const oi=after.indexOf(OPEN[i]);
      if(oi!==-1){
        const ci=after.indexOf(CLOSE[i],oi+1);
        if(ci!==-1) return after.slice(oi+1,ci).trim();
        // No closing quote - stop at ; or QC Note or newline
        const stops=[after.indexOf(';',oi+1),after.search(/QC\s*[Nn]ote/i),after.indexOf('\n',oi+1)].filter(x=>x>oi).sort((a,b)=>a-b);
        const stop=stops[0]||after.length;
        return after.slice(oi+1,stop).trim();
      }
    }
    // No quotes at all
    const stops=[after.indexOf(';'),after.indexOf('\n'),after.search(/QC\s*[Nn]ote/i)].filter(x=>x>0).sort((a,b)=>a-b);
    return after.slice(0,stops[0]||after.length).trim();
  }
  return '';
}
function extractNote(remarks){
  if(!remarks) return '';
  const m=remarks.match(/(?:QC\s*)?[Nn]ote\s*[\-\u2013\u2014:]+\s*["\u201c\u00ab]?(.+)/s);
  if(!m) return '';
  let note=m[1].replace(/^["\u201c\u00ab]|["\u201d\u00bb]$/g,'').trim();
  const stop=note.search(/[Ll]ine\s+from\s+[Ss]cript/i);
  if(stop>-1) note=note.slice(0,stop).trim();
  return note.split('\n')[0].replace(/["\u201d\u00bb]$/g,'').trim();
}

  const needed=remarks.filter(r=>r.needsPatch);

}

function extractWord(raw){
  const wm=(raw||'').match(/[Ww]ord\s*[:\-]\s*["\u201c\u00ab]?\s*([^"\u201d\u00bb\n;]+)/);
  return wm?wm[1].replace(/["\u201d\u00bb\u201c\u00ab]/g,'').trim():'';
}

function mkTake(ri,ti){
  const st=RS[ri], take=st.takes[ti];
  const isGen=st.status==='generating'&&!take;
  const isAcc=st.acceptedTake===ti, isDis=(st.discarded||[]).includes(ti);
  const cls=isGen?'tk-gen':take?(isAcc?'tk-acc':isDis?'tk-dis':''):'';
  return `<div class="tc ${cls}" id="tc-${ri}-${ti}">
    <div class="take-num">Take ${ti+1}${isAcc?' ✓':''}</div>
    ${isGen?`<div class="take-spin">🎙 Generating...</div>`
    :take?`<audio controls src="${take}" style="width:100%;height:28px;margin-bottom:8px" preload="metadata"></audio>
           <div class="take-acts"><button class="ta-acc" onclick="accTake(${ri},${ti})" ${isAcc?'disabled':''}>✓ Accept</button>
           <button class="ta-dis" onclick="disTake(${ri},${ti})">✗</button></div>`
    :`<div class="take-empty">Not generated</div>`}
  </div>`;
}

async function getEpisodeAudioUrl(){
  if(!activeEp) return null;
  try{
    const showId=activeEp._bookId||activeEp.book_id||activeShowId||'';
    const chapId=activeEp.chapter_id;

    if(muResp.ok){

    }

async function genTakes(ri){
  const st=RS[ri], line=st.scriptLine||remarks[ri].scriptLine;
  if(!line.trim()){toast('Script line is empty — edit it first','warn');return;}
  // Use show config values, fall back to hidden inputs
  asKey=activeShowConfig?.asKey||document.getElementById('asKeyInp').value.trim();
  asVoice=activeShowConfig?.voiceId||document.getElementById('asVoiceInp').value.trim();
  voiceType=activeShowConfig?.voiceType||document.getElementById('voiceType').value;
  console.log('Generating with voice:', asVoice, 'type:', voiceType);
  st.status='generating'; st.takes=[null,null,null]; st.acceptedTake=-1; st.discarded=[];
  refreshCard(ri);
  const chapId=activeEp.chapter_id;
  await Promise.allSettled([0,1,2].map(ti=>genOneTake(line.trim(),ri,ti,chapId)));
  st.status=st.takes.some(t=>t)?'done':'error';
  refreshCard(ri); updateStitchBtn();
  toast(`3 takes generated for remark ${ri+1}`,'ok');
}

async function genOneTake(text,ri,ti,chapId){
  const st=RS[ri], h={'x-api-key':asKey,'Content-Type':'application/json'};
  try{
    // Clean text: remove bracketed tags, strip AudioStack invalid chars, normalize quotes
    let cleanText=text
      .replace(/\[[^\]]*\]/g,'')
      .replace(/[\u00ab\u00bb]/g,'"')
      .replace(/[\u2018\u2019]/g,"'")
      .replace(/[\u201c\u201d\u201e]/g,'"')
      .replace(/[\u2013\u2014]/g,'-')
      .replace(/[\[\]^{}>\-#|<\\{}]/g,'')
      .replace(/\s+/g,' ').trim();
    if(!cleanText){cleanText=text.replace(/[\[\]^{}>\-#|<\\{}]/g,'').replace(/\s+/g,' ').trim();}
    console.log(`Take ${ti} sending text:`, cleanText.substring(0,100));
    const sr=await fetch(`${AS_BASE}/content/script`,{method:'POST',headers:h,body:JSON.stringify({scriptText:cleanText,projectName:'PatchStudio'})});
    const srText=await sr.text();
    if(!sr.ok){console.error(`Script API ${sr.status}:`,srText); throw new Error('Script API error: '+sr.status+' '+srText.substring(0,200));}
    const sd=JSON.parse(srText);
    const scriptId=sd.scriptId||sd.script_id||sd.id||(sd.data&&(sd.data.scriptId||sd.data.script_id||sd.data.id))||(sd.response&&(sd.response.scriptId||sd.response.script_id));
    if(!scriptId) throw new Error('No scriptId in response: '+srText.substring(0,200));

    const ttsBody={scriptId,voice:asVoice,sync:true};
    if(voiceType==='expressive') ttsBody.voiceIntelligence=true;
    const tr=await fetch(`${AS_BASE}/speech/tts`,{method:'POST',headers:h,body:JSON.stringify(ttsBody)});
    const td=JSON.parse(await tr.text());
    let audioUrl=td.url||td.audioUrl||td.data?.url||td.data?.sections?.[0]?.url||td.sections?.[0]?.url;
    const speechId=td.speechId||td.speech_id||td.data?.speechId;

    if(!audioUrl&&speechId){
      for(let i=0;i<20;i++){
        await sleep(2500);
        const p=await fetch(`${AS_BASE}/speech/tts/${speechId}`,{headers:h});
        if(p.ok){const pd=await p.json(); audioUrl=pd.url||pd.audioUrl||pd.data?.url||pd.data?.sections?.[0]?.url; if(audioUrl) break;}
      }
    }
    if(!audioUrl) throw new Error('No audio URL');

    let blob;
    const dl=await fetch(audioUrl,{headers:{'x-api-key':asKey}});
    if(dl.ok){ blob=await dl.blob(); } else { const dl2=await fetch(audioUrl); if(!dl2.ok) throw new Error('Download failed'); blob=await dl2.blob(); }

    await dbSetBlob(`${chapId}_r${ri}_t${ti}`,blob);
    st.takes[ti]=URL.createObjectURL(blob);
    const el=document.getElementById(`tc-${ri}-${ti}`);
    if(el) el.outerHTML=mkTake(ri,ti);
  }catch(e){
    console.error(`Take ${ti} err:`,e); toast(`Take ${ti+1}: ${e.message}`,'err');
  }
}

async function accTake(ri,ti){
  RS[ri].acceptedTake=ti; RS[ri].status='accepted';
  await dbSet('config',`${activeEp.chapter_id}_r${ri}_acc`,ti);
  refreshCard(ri); updateStitchBtn();
  // Save to SE data (await to ensure Base64 conversion completes)
  toast(`Take ${ti+1} accepted — saving audio...`,'ok');
  await updateSEDataForCurrentEp();
  toast(`Patch audio saved ✓`,'ok');
}

async function updateSEDataForCurrentEp(){
  if(!activeEp) return;
  const chapId=activeEp.chapter_id;
  const title=activeEp.chapter_title||'Episode';
  const patchesData=[];
  for(const r of remarks.filter(r=>r.needsPatch&&RS[r.idx]?.acceptedTake>=0)){
    const st=RS[r.idx];
    const blobUrl=st.takes[st.acceptedTake]||null;
    let audioBase64=null;
    // Convert blob URL to Base64 for Firebase storage
    if(blobUrl){
      try{
        const resp=await fetch(blobUrl);
        const blob=await resp.blob();
        audioBase64=await new Promise((res)=>{
          const reader=new FileReader();
          reader.onloadend=()=>res(reader.result);
          reader.readAsDataURL(blob);
        });
      }catch(e){ console.warn('Could not convert audio to base64:', e); }
    }
    patchesData.push({time:r.time, remark:r.rawRemarks?.substring(0,100)||r.issueType, issueType:r.issueType, scriptLine:st.scriptLine||r.scriptLine, audioBase64});
  }
  saveSEData(chapId, title, patchesData, null);
}
async function setDisposition(ri, disp){
  RS[ri].disposition=disp;
  if(activeEp) await dbSet('config',`${activeEp.chapter_id}_r${ri}_disp`,disp);
  // Save to Firebase so other users see it
  if(activeEp) fbDb.ref('episodeRemarks/'+activeEp.chapter_id+'/dispositions/'+ri).set(disp||null);
  refreshCard(ri); updateStitchBtn();
  if(disp==='no_patch') toast('Marked: no patch required','ok');
  else if(disp==='wrong_error') toast('Marked: wrong error','ok');
  else toast('Disposition cleared','ok');
}

async function disTake(ri,ti){
  if(!RS[ri].discarded) RS[ri].discarded=[];
  if(!RS[ri].discarded.includes(ti)) RS[ri].discarded.push(ti);
  const wasAccepted=RS[ri].acceptedTake===ti;
  if(wasAccepted){RS[ri].acceptedTake=-1;RS[ri].status='done';}
  await dbSet('config',`${activeEp.chapter_id}_r${ri}_acc`,-1);
  refreshCard(ri); updateStitchBtn();
  if(wasAccepted){
    await updateSEDataForCurrentEp();
    toast(`Take ${ti+1} rejected — removed from SE`,'ok');
  }
}
async function generateAllPending(){
  const pending=remarks.filter(r=>r.needsPatch&&RS[r.idx].status==='idle');
  if(!pending.length){toast('No idle patches','warn');return;}
  for(const r of pending) await genTakes(r.idx);
}

function updateStitchBtn(){
  const accepted=remarks.filter(r=>r.needsPatch&&RS[r.idx].acceptedTake>=0);
  const needed=remarks.filter(r=>r.needsPatch);
  const btn=document.getElementById('stitchAllBtn');

  else btn.style.display='none';
